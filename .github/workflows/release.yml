name: Android Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Restore release keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/release.keystore"

      - name: Test and build signed APK
        env:
          RELEASE_KEYSTORE_PATH: ${{ runner.temp }}/release.keystore
          RELEASE_KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: ./gradlew testDebugUnitTest assembleRelease

      - name: Prepare release files
        run: |
          cp app/build/outputs/apk/release/app-release.apk "speed-stacking-timer-codex-${GITHUB_REF_NAME}.apk"
          shasum -a 256 "speed-stacking-timer-codex-${GITHUB_REF_NAME}.apk" > "speed-stacking-timer-codex-${GITHUB_REF_NAME}.apk.sha256"

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            "speed-stacking-timer-codex-${GITHUB_REF_NAME}.apk" \
            "speed-stacking-timer-codex-${GITHUB_REF_NAME}.apk.sha256" \
            --title "스피드-스태깅-타이머 (codex) ${GITHUB_REF_NAME}" \
            --generate-notes
